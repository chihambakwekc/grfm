name: grfm-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - ./frontend/src/assets/geo:/app/geo:ro
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    expose:
      - "80"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/var/www/backend-static:ro
      - backend_media:/var/www/backend-media:ro
    networks:
      internal:
      proxy:
        aliases:
          - ${PROXY_HOST_ALIAS:-grfm-app}

volumes:
  postgres_data_prod:
  backend_media:
  backend_static:

networks:
  internal:
  proxy:
    external: true
    name: ${NPM_NETWORK:-proxy}
