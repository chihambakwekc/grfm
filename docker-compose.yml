name: grfm

services:
  db:
    image: postgres:16-alpine
    container_name: grfm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grfm_db}
      POSTGRES_USER: ${POSTGRES_USER:-grfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grfm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  redis:
    image: redis:7-alpine
    container_name: grfm_redis
    restart: unless-stopped
    ports:
      - "6382:6379"

  backend:
    build:
      context: ./backend
    container_name: grfm_backend
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./frontend/src/assets/geo:/app/geo:ro
    depends_on:
      - db
      - redis
    ports:
      - "8003:8000"

  frontend:
    build:
      context: ./frontend
    container_name: grfm_frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5176:5173"

  nginx:
    image: nginx:alpine
    container_name: grfm_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "1516:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  frontend_node_modules:
